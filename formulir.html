  <style>
    :root {
      --navy: #071c35;
      --blue: #1469b8;
      --blue-light: #eaf4ff;
      --white: #ffffff;
      --background: #f5f8fc;
      --text: #15253d;
      --text-light: #607089;
      --border: #dce5ef;
      --green: #14804a;
      --shadow: 0 16px 40px rgba(7, 28, 53, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
    }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      z-index: 100;
      top: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
    }

    .navbar {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--navy);
      text-decoration: none;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      display: grid;
      flex-shrink: 0;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(
        135deg,
        #0d315c,
        #1469b8,
        #44a4e8
      );
      color: white;
      font-weight: 800;
    }

    .brand strong {
      display: block;
      font-size: 17px;
    }

    .brand span {
      display: block;
      color: var(--text-light);
      font-size: 12px;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 23px;
    }

    nav a {
      color: #31445f;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    nav a:hover {
      color: var(--blue);
    }

    .hero {
      padding: 80px 0;
      background:
        radial-gradient(
          circle at 85% 20%,
          rgba(72, 201, 176, 0.28),
          transparent 28%
        ),
        linear-gradient(
          135deg,
          #071c35,
          #0b4d65,
          #168b8d
        );
      color: white;
    }

    .hero-content {
      max-width: 800px;
    }

    .hero-label {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 14px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(40px, 7vw, 64px);
      line-height: 1.08;
    }

    .hero p {
      margin: 0;
      color: #dceef0;
      font-size: 18px;
    }

    main {
      padding: 70px 0;
    }

    .section-heading {
      margin-bottom: 32px;
    }

    .section-heading h2 {
      margin: 0 0 10px;
      color: var(--navy);
      font-size: 34px;
    }

    .section-heading p {
      max-width: 720px;
      margin: 0;
      color: var(--text-light);
    }

    .filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }

    .filter-button {
      padding: 9px 15px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: white;
      color: #31445f;
      font-size: 13px;
      font-weight: 700;
    }

    .filter-button.active {
      border-color: var(--blue);
      background: var(--blue);
      color: white;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
    }

    .template-card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: white;
      box-shadow: var(--shadow);
    }

    .template-cover {
      min-height: 220px;
      display: flex;
      align-items: flex-end;
      padding: 25px;
      background:
        radial-gradient(
          circle at 80% 20%,
          rgba(255, 255, 255, 0.23),
          transparent 28%
        ),
        linear-gradient(
          145deg,
          #123d43,
          #167078,
          #38a2a0
        );
      color: white;
    }

    .template-cover.blue {
      background:
        radial-gradient(
          circle at 80% 20%,
          rgba(255, 255, 255, 0.22),
          transparent 28%
        ),
        linear-gradient(
          145deg,
          #071c35,
          #0d4f86,
          #2393d1
        );
    }

    .template-cover.purple {
      background:
        radial-gradient(
          circle at 80% 20%,
          rgba(255, 255, 255, 0.22),
          transparent 28%
        ),
        linear-gradient(
          145deg,
          #30204f,
          #5142a5,
          #258ac0
        );
    }

    .file-type {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .template-cover h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .template-content {
      padding: 24px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 14px;
    }

    .tag {
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--blue-light);
      color: var(--blue);
      font-size: 11px;
      font-weight: 800;
    }

    .template-content p {
      margin: 0 0 20px;
      color: var(--text-light);
      font-size: 14px;
    }

    .file-info {
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .file-info-row {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .file-info-row span:first-child {
      color: var(--text-light);
    }

    .file-info-row span:last-child {
      color: var(--navy);
      font-weight: 700;
      text-align: right;
    }

    .template-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .button {
      display: inline-flex;
      min-height: 44px;
      flex: 1;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .button-primary {
      background: var(--blue);
      color: white;
    }

    .button-secondary {
      border: 1px solid var(--border);
      background: white;
      color: var(--navy);
    }

    .button.disabled {
      opacity: 0.55;
      pointer-events: none;
    }

    .notice {
      margin-top: 44px;
      padding: 26px;
      border-left: 5px solid var(--blue);
      border-radius: 12px;
      background: var(--blue-light);
    }

    .notice h2 {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: 20px;
    }

    .notice p {
      margin: 0;
      color: #50647f;
      font-size: 14px;
    }

      padding: 30px 0;
      background: #041426;
      color: #b8c9d9;
    }

    .footer-content {
      display: flex;
      justify-content: space-between;
      gap: 24px;
    }

    .footer-content p {
      margin: 0;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .template-grid {
        grid-template-columns: repeat(2, 1fr);
      }

    @media (max-width: 680px) {
      .container {
        width: min(100% - 28px, 1120px);

        padding: 14px 0;
        flex-direction: column;
      }

      nav {
        gap: 14px;
      }

      .template-grid {
        grid-template-columns: 1fr;
      }

      .footer-content {
        flex-direction: column;
      }

  .form-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 28px;
}

.search-input {
  width: 100%;
  max-width: 680px;
  min-height: 48px;
  padding: 12px 17px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: white;
  color: var(--text);
  font: inherit;
  font-size: 14px;
  outline: none;
}

.search-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(20, 105, 184, 0.1);
}

.search-result {
  flex-shrink: 0;
  margin: 0;
  color: var(--text-light);
  font-size: 13px;
  font-weight: 700;
}

.folder-list {
  display: grid;
  gap: 14px;
}

.folder-card {
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 15px;
  background: white;
  box-shadow: 0 8px 25px rgba(7, 28, 53, 0.05);
}

.folder-card summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 20px 22px;
  color: var(--navy);
  cursor: pointer;
  font-size: 16px;
  font-weight: 800;
  list-style: none;
}

.folder-card summary::-webkit-details-marker {
  display: none;
}

.folder-card summary::after {
  content: "+";
  width: 30px;
  height: 30px;
  display: grid;
  flex-shrink: 0;
  place-items: center;
  border-radius: 50%;
  background: var(--blue-light);
  color: var(--blue);
  font-size: 20px;
}

.folder-card[open] summary::after {
  content: "−";
}

.folder-summary-main {
  display: flex;
  align-items: center;
  gap: 13px;
}

.folder-icon {
  width: 42px;
  height: 42px;
  display: grid;
  flex-shrink: 0;
  place-items: center;
  border-radius: 11px;
  background: var(--blue-light);
  font-size: 20px;
}

.folder-count {
  display: block;
  margin-top: 2px;
  color: var(--text-light);
  font-size: 12px;
  font-weight: 600;
}

.file-list {
  padding: 0 22px 20px;
  border-top: 1px solid var(--border);
}

.file-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 22px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.file-row:last-child {
  border-bottom: 0;
}

.file-main {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.file-type-badge {
  min-width: 47px;
  padding: 5px 8px;
  border-radius: 7px;
  background: var(--blue-light);
  color: var(--blue);
  font-size: 10px;
  font-weight: 900;
  text-align: center;
}

.file-title {
  color: var(--navy);
  font-size: 14px;
  font-weight: 700;
}

.file-number {
  display: block;
  margin-bottom: 2px;
  color: var(--text-light);
  font-size: 11px;
  font-weight: 600;
}

.file-button {
  display: inline-flex;
  min-height: 38px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  padding: 8px 15px;
  border-radius: 8px;
  background: var(--blue);
  color: white;
  font-size: 12px;
  font-weight: 800;
  text-decoration: none;
}

.file-button:hover {
  background: #0f5596;
}

.empty-folder {
  padding: 20px 0 2px;
  color: var(--text-light);
  font-size: 14px;
}

.no-result {
  padding: 35px;
  border: 1px dashed var(--border);
  border-radius: 14px;
  background: white;
  color: var(--text-light);
  text-align: center;
}

@media (max-width: 680px) {
  .form-toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .search-input {
    max-width: none;
  }

  .file-row {
    align-items: flex-start;
    flex-direction: column;
  }

  .file-button {
    width: 100%;
  }
}
</head>

  const folderList = document.getElementById("folderList");
  const searchInput = document.getElementById("formSearch");
  const searchResult = document.getElementById("searchResult");

  function renderFolders(searchTerm = "") {
    const term = searchTerm.trim().toLowerCase();
    let totalFiles = 0;

    const filteredFolders = folders
      .map((folder) => {
        const folderMatches =
          folder.title.toLowerCase().includes(term);

        const matchedFiles = folderMatches
          ? folder.files
          : folder.files.filter((file) => {
              return (
                file.title.toLowerCase().includes(term) ||
                file.number.toLowerCase().includes(term) ||
                file.type.toLowerCase().includes(term)
              );
            });

        return {
          ...folder,
          files: matchedFiles
        };
      })
      .filter((folder) => {
        return (
          folder.title.toLowerCase().includes(term) ||
          folder.files.length > 0 ||
          (!term && folder.title === "16. Formulir PYSTT")
        );
      });

    filteredFolders.forEach((folder) => {
      totalFiles += folder.files.length;
    });

    searchResult.textContent =
      totalFiles + " file ditemukan";

    if (filteredFolders.length === 0) {
      folderList.innerHTML = `
        <div class="no-result">
          Formulir yang Anda cari belum ditemukan.
        </div>
      `;
      return;
    }

    folderList.innerHTML = filteredFolders
      .map((folder) => {
        const fileRows = folder.files.length
          ? folder.files
              .map((file) => {
                const fileUrl =
                  releaseBase + file.asset;

                return `
                  <div class="file-row">
                    <div class="file-main">
                      <span class="file-type-badge">
                        ${file.type}
                      </span>

                      <div>
                        <span class="file-number">
                          ${file.number}
                        </span>

                        <div class="file-title">
                          ${file.title}
                        </div>
                      </div>
                    </div>

                    <a
                      class="file-button"
                      href="${fileUrl}"
                      target="_blank"
                      rel="noopener noreferrer"
                    >
                      Unduh
                    </a>
                  </div>
                `;
              })
              .join("")
          : `
              <div class="empty-folder">
                File untuk kategori ini belum ditambahkan.
              </div>
            `;

        const openAttribute = term ? "open" : "";

        return `
          <details class="folder-card" ${openAttribute}>
            <summary>
              <div class="folder-summary-main">
                <span class="folder-icon">📁</span>

                <div>
                  ${folder.title}

                  <span class="folder-count">
                    ${folder.files.length} file
                  </span>
                </div>
              </div>
            </summary>

            <div class="file-list">
              ${fileRows}
            </div>
          </details>
        `;
      })
      .join("");
  }

  searchInput.addEventListener("input", (event) => {
    renderFolders(event.target.value);
  });

  document.getElementById("currentYear").textContent =
    new Date().getFullYear();

  renderFolders();
</script>
